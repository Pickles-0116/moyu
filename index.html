<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>掌柜偷闲录 - 古风经营摸鱼游戏</title>
  <link rel="stylesheet" href="css/style.css?v=2.4.1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>">
</head>
<body>

  <!-- 伪装模式覆盖层 -->
  <div id="disguiseOverlay" class="disguise-overlay"></div>

  <!-- 教程覆盖层 -->
  <div id="tutorialOverlay" class="tutorial-overlay" style="display:none;"></div>

  <!-- 模态面板 -->
  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div id="modalContent" class="modal-content"></div>
  </div>

  <!-- 主应用 -->
  <div id="app">
    <!-- 顶部导航栏 -->
    <nav class="navbar">
      <div class="navbar-brand">
        <span class="brand-icon">🏮</span>
        <span>掌柜偷闲录</span>
      </div>
      <div class="navbar-tabs">
        <button class="nav-tab outing" id="outingBtn" title="外出探索" style="font-weight:bold;color:var(--gold-dark);">🏯 外出</button>
        <button class="nav-tab" id="marketBtn" title="每日商情">📊 商情</button>
        <button class="nav-tab" id="roadBtn" title="商途地图">🗺️ 地图</button>
        <button class="nav-tab" id="backpackBtn" title="行囊背包">🎒 背包</button>
        <button class="nav-tab" id="rumorBtn" title="江湖传闻">📖 传闻</button>
        <button class="nav-tab" id="achievementBtn" title="成就系统">🏆 成就</button>
        <button class="nav-tab" id="dailyBtn" title="每日奖励">📅 签到</button>
        <button class="nav-tab" id="prestigeBtn" title="声望重置">🔥 重置</button>
        <button class="nav-tab" id="settingsBtn" title="游戏设置">⚙️ 设置</button>
      </div>
      <div class="navbar-actions">
        <button class="nav-btn boss-key" id="bossKeyBtn" title="按 ESC 键快速切换">🔒 老板键 [ESC]</button>
        <button class="nav-btn" id="resetBtn" title="重置游戏进度">🔄 重置</button>
      </div>
    </nav>

    <!-- 资源面板 -->
    <div id="resourcePanel" class="resource-panel"></div>

    <!-- 精力条 -->
    <div class="energy-bar-container">
      <span class="energy-bar-label">精力</span>
      <div class="energy-bar">
        <div id="energyBar" class="energy-bar-fill" style="width: 100%"></div>
      </div>
      <span id="energyText" class="energy-text">⚡ 20/20</span>
      <span id="energyRecovery" style="font-size:0.8rem;color:var(--ink-muted);">精力充沛</span>
    </div>

    <!-- 出发按钮 -->
    <div class="travel-btn-container">
      <button id="travelBtn" class="travel-btn">🚩 出发经商</button>
      <button id="fastTravelBtn" class="travel-btn fast-travel" disabled title="需持有「御赐商牌」才能快速行商">⚡ 行商×10</button>
    </div>

    <!-- 快捷栏 -->
    <div id="quickSlotBar" class="quick-slot-bar"></div>

    <!-- 主布局 -->
    <div class="main-layout">
      <!-- 左侧：事件区域 -->
      <div id="eventArea" class="event-area">
        <div class="event-idle">
          <div class="idle-icon">🏮</div>
          <div class="idle-text">掌柜的，要出发经商吗？</div>
          <div class="idle-subtitle">点击「出发」开启一段新的商途之旅</div>
        </div>
      </div>

      <!-- 右侧：店铺面板 -->
      <div class="sidebar">
        <div class="shop-panel">
          <div class="panel-title">🏪 店铺经营 <span style="font-size:0.75rem;color:var(--ink-muted);">(含道具售卖)</span></div>
          <div id="shopList" class="shop-list"></div>
          <div id="totalOutput" style="margin-top:var(--space-sm);font-size:0.85rem;color:var(--ink-muted);text-align:center;">总产出：0 银两/10秒</div>
        </div>
      </div>
    </div>

    <!-- 日志栏 -->
    <div class="log-panel">
      <div class="panel-title">📜 商途日志</div>
      <div id="logList" class="log-list">
        <div class="log-entry info">欢迎掌柜！点击「出发」开始你的商途旅程吧。</div>
      </div>
    </div>
  </div>

  <!-- 游戏脚本 -->
  <script src="js/data.js?v=2.4.1"></script>
  <script src="js/game.js?v=2.4.1"></script>
  <script src="js/ui.js?v=2.4.1"></script>
</body>
</html>
